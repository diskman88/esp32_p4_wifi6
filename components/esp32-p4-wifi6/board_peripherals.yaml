# Peripherals Configuration for ESP32-S3-KORVO2-V3
peripherals:
  # I2C Configuration
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 17
        scl: 18

  # I2S Audio Configuration
  - name: i2s_audio_out
    type: i2s
    role: master
    format: tdm-out                     # tdm-out, tdm-in
    config: &i2s_config
      port: 0
      # Clock configuration
      sample_rate_hz: 48000             # Sample rate in Hz
      mclk_multiple: 256                # Multiple of MCLK to sample rate (256 or 384 for 24-bit)
      # Slot configuration
      data_bit_width: 16                # Data bit width (valid data bits per sample)
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO  # Total bits per slot (I2S_SLOT_BIT_WIDTH_AUTO or specific value)
      slot_mode: I2S_SLOT_MODE_MONO     # I2S_SLOT_MODE_MONO or I2S_SLOT_MODE_STEREO
      slot_mask: I2S_TDM_SLOT0          # I2S_TDM_SLOT0, I2S_TDM_SLOT1 slots
      ws_width: 16                      # WS signal width in BCLK ticks
      total_slot: 2

      # GPIO configuration
      pins:
        mclk: 16                       # GPIO number for MCLK
        bclk: 9                        # GPIO number for BCLK
        ws: 45                         # GPIO number for WS
        dout: 8                        # GPIO number for DATA out
        din: 10                        # GPIO number for DATA in

  - name: i2s_audio_in
    type: i2s
    role: master
    format: tdm-in
    config:
      <<: *i2s_config                   # Inherit base I2S configuration
      mclk_multiple: 384                # Set MCLK multiple for 3 slots
      slot_mask: I2S_TDM_SLOT0 | I2S_TDM_SLOT1 | I2S_TDM_SLOT2  # Override specific slot mask
      slot_mode: I2S_SLOT_MODE_STEREO

  # Power amplifier control
  - name: gpio_power_amp
    type: gpio
    role: io
    config:
      pin: 48                           # GPIO48 - Power amplifier control
      mode: GPIO_MODE_OUTPUT
      default_level: 1

# DSI Display Configuration
# This configuration sets up a MIPI DSI display interface
# Based on common DSI display parameters

  - name: dsi_display
    type: dsi
    config:
      # DSI bus identifier (default: 0 for primary bus)
      # Valid values depending on available DSI controllers, esp32p4 support only 1 MIPI DSI bus
      bus_id: 0

      # Number of data lanes (default: 2 for dual-lane mode)
      # esp32p4 support up to 2 data lanes
      data_lanes: 2

      # Physical layer clock source (default: MIPI_DSI_PHY_CLK_SRC_DEFAULT)
      phy_clk_src: 0
      # Valid values:
      # - 0 (Set it to 0 and then let the driver configure it)
      # - MIPI_DSI_PHY_CLK_SRC_DEFAULT
      # - MIPI_DSI_PHY_CLK_SRC_PLL_F20M
      # - MIPI_DSI_PHY_CLK_SRC_PLL_F25M
      # - MIPI_DSI_PHY_CLK_SRC_RC_FAST

      # Bit rate per data lane in Mbps (default: 1000 for 1Gbps per lane)
      # Common values between 80 to 1500 Mbps depending on display capabilities
      lane_bit_rate_mbps: 1000          # [TO_BE_CONFIRMED] Bit rate per data lane in Mbps

  # ADC for Button
  - name: adc_oneshot
    type: adc
    role: oneshot
    config:
      unit_id: ADC_UNIT_1
      channel_id: 4
      atten: ADC_ATTEN_DB_12
      bit_width: ADC_BITWIDTH_12
